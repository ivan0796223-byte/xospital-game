{% extends "base.html" %}
{% block content %}

<h2>👤 Пациенты</h2>

<form method="POST" action="/heal">
    {% for patient in patients %}
        <button name="patient" value="{{ patient }}">
            🩺 {{ patient }} (+100💰 +10⭐)
        </button><br>
    {% endfor %}
</form>

<br>

{% if page > 1 %}
<a href="/patients?page={{ page-1 }}"><button>⬅ Назад</button></a>
{% endif %}

Страница {{ page }}

{% if page*20 < total %}
<a href="/patients?page={{ page+1 }}"><button>➡ Вперёд</button></a>
{% endif %}

<br><br>

<a href="/"><button>🏠 Главная</button></a>

{% endblock %}
