<style>
body {background:#0a0a0a;color:white;font-family:Arial;}
.card {border:2px solid red;border-radius:15px;padding:10px;margin:10px;background:#111;}
button {background:red;color:white;border:none;padding:8px;margin:5px;border-radius:10px;}
.progress {width:200px;height:10px;background:#222;}
.bar {height:10px;background:red;}
</style>

<h1>🏥 XOSPITAL</h1>

<div class="card">
{% if player %}
💰 {{player.coins}} 💎 {{player.diamonds}} ⭐ {{player.xp}} LVL {{player.level}}
{% else %}
Войдите
{% endif %}
<br>🟢 Онлайн: {{online}}
</div>

<div class="card">
<div class="progress">
<div class="bar" style="width:{{player.xp if player else 0}}px"></div>
</div>
</div>

<a href="/add_patient"><button>➕ Пациент</button></a>
<a href="/add_car"><button>🚑 Машины</button></a>
<a href="/operation"><button>🎲 Операция</button></a>
<a href="/chat"><button>💬 Чат</button></a>
<a href="/call_patient"><button>📞 Вызов</button></a>

<a href="/exchange"><button>💱 Обмен</button></a>
<a href="/buy_diamonds"><button>💎 Купить</button></a>
<a href="/time_msk"><button>🕒 МСК</button></a>

<div class="card">
<h2>👤 Пациенты</h2>
{% for p in patients %}
<div style="border-radius:50px;border:2px solid red;padding:10px;">
🏥 {{p.name}} - {{p.status}}
<a href="/select_patient/{{p.id}}">
<button>Выбрать</button>
</a>
</div>
{% endfor %}
</div>

<div class="card">
<h2>🚑 Автопарк</h2>
{% for c in cars %}
<div style="border-radius:50%;border:2px solid red;padding:10px;">
🚗 {{c.name}}
</div>
{% endfor %}
</div>
