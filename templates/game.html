<!DOCTYPE html>
<html>
<head>
<style>
body {
    background:#0d0d0d;
    color:white;
    font-family:Arial;
}

.top {
    padding:10px;
    border-bottom:2px solid red;
}

.cross {
    color:red;
}

.box {
    background:#1a1a1a;
    padding:10px;
    margin:10px;
    border-radius:15px;
}

.progress {
    background:#333;
    border-radius:10px;
    overflow:hidden;
}

.progress div {
    height:10px;
    background:red;
}

button {
    background:red;
    color:white;
    border:none;
    padding:10px;
    border-radius:50px;
}

.icon {
    width:40px;
    height:40px;
    border-radius:50%;
    background:red;
    display:inline-block;
}

</style>
</head>

<body>

<div class="top">
    ❤️ Онлайн: {{online}} |
    💰 {{user.coins}} |
    💎 {{user.diamonds}} |
    ⭐ Уровень {{level}} |
    🕒 {{time.strftime("%H:%M")}}
</div>

<div class="progress">
    <div style="width:{{progress}}%"></div>
</div>

<div class="box">
    <h3 class="cross">✚ ЧАТ</h3>
    {% for m in messages %}
        <p>{{m.user}}: {{m.text}}</p>
    {% endfor %}
    <form method="POST" action="/send">
        <input name="text">
        <button>➤</button>
    </form>
</div>

<div class="box">
    <h3 class="cross">✚ ПАЦИЕНТЫ</h3>
    <a href="/patients"><button>Выбрать пациента</button></a>
</div>

<div class="box">
    <h3 class="cross">✚ АВТОПАРК</h3>
    <a href="/garage"><button>🚑 Вызов</button></a>
</div>

<div class="box">
    <h3 class="cross">✚ ОПЕРАЦИОННАЯ</h3>
    <a href="/operate"><button>🎲 Бросить кубик</button></a>
</div>

<div class="box">
    <h3 class="cross">✚ ЛАБОРАТОРИЯ</h3>
    <a href="/lab"><button>🧪 Анализ</button></a>
</div>

<div class="box">
    <h3 class="cross">✚ ОБМЕННИК</h3>
    <a href="/exchange"><button>💱 Обмен</button></a>
</div>

<div class="box">
    <h3 class="cross">✚ СОЮЗ</h3>
    <a href="/alliance"><button>👥 Союз / ЗАГС</button></a>
</div>

</body>
</html>
