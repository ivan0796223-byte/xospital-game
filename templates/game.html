<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Hospital V3</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<h2>❌ Hospital V3</h2>

<div class="panel">
    Онлайн: {{online}} <br>
    💰 {{user.coins}} | 💎 {{user.diamonds}} | ⭐ {{user.xp}}
</div>

<div class="panel">
    <a href="/wards"><button>Палаты</button></a>
    <a href="/operating"><button>Операционная 🎲</button></a>
    <a href="/lab"><button>Лаборатория</button></a>
    <a href="/shop"><button>Магазин</button></a>
    <a href="/alliances"><button>Союзы</button></a>
</div>

<div class="panel">
    Прогресс:
    <br>
    <progress value="{{user.xp}}" max="100"></progress>
</div>

<!-- 💬 ЧАТ -->
<div class="panel">
    <h3>💬 Чат</h3>
    <div id="chat-box" style="height:200px; overflow:auto;"></div>
    
    <input id="chat-input" placeholder="Сообщение">
    <button onclick="sendMessage()">Отправить</button>
</div>

<script src="/static/script.js"></script>

</body>
</html>
