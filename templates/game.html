<style>
body {
    background:#000;
    color:white;
    font-family:Arial;
}

.card {
    border:2px solid red;
    border-radius:12px;
    padding:10px;
    margin:10px;
}

button {
    background:red;
    color:white;
    border:none;
    padding:5px;
}

.patient {
    border:1px solid red;
    margin:5px;
    padding:5px;
}
</style>

<h1>🏥 XOSPITAL</h1>

<div class="card">
💰 {{player.coins}} |
💎 {{player.diamonds}} |
⭐ {{player.xp}} |
🏆 Lv {{player.level}}
</div>

<a href="/add_patient"><button>➕ Пациент</button></a>
<a href="/operation"><button>🎲 Операция</button></a>
<a href="/chat"><button>💬 Чат</button></a>

<h2>👤 Пациенты</h2>

{% for p in patients %}
<div class="patient">
{{p.name}} - {{p.status}}
<a href="/select_patient/{{p.id}}"><button>Выбрать</button></a>
</div>
{% endfor %}
