{% extends "base.html" %}

{% block content %}

<h2>👤 Пациенты</h2>

{% for p in game.patients %}
<div>
    <p>
        {{ p.name }} — {{ p.disease }}
        {% if p.healed %}
            ✅ вылечен
        {% else %}
            ❌ болен
            <a href="/heal/{{ p.id }}"><button>Операция</button></a>
        {% endif %}
    </p>
</div>
{% endfor %}

{% endblock %}
