{% extends "base.html" %}
{% block content %}

<h2>Пациенты</h2>

<form method="POST" action="/heal">
{% for p in patients %}
<button>{{ p }}</button><br>
{% endfor %}
</form>

{% if page > 1 %}
<a href="/patients?page={{ page-1 }}"><button>⬅</button></a>
{% endif %}

Страница {{ page }}

{% if page*20 < total %}
<a href="/patients?page={{ page+1 }}"><button>➡</button></a>
{% endif %}

{% endblock %}
