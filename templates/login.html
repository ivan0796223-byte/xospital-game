<!DOCTYPE html>
<html>
<body style="background:#0f172a;color:white;text-align:center">

<h2>🏥 Вход / Регистрация</h2>

<input id="name" placeholder="Логин"><br>
<input id="pass" placeholder="Пароль" type="password"><br>

<button onclick="reg()">Регистрация</button>
<button onclick="login()">Вход</button>

<script>
function reg(){
fetch("/register",{method:"POST",headers:{"Content-Type":"application/json"},
body:JSON.stringify({name:name.value,password:pass.value})})
.then(()=>location.reload())
}

function login(){
fetch("/login",{method:"POST",headers:{"Content-Type":"application/json"},
body:JSON.stringify({name:name.value,password:pass.value})})
.then(()=>location.reload())
}
</script>

</body>
</html>
