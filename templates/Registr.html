
<!DOCTYPE html>
<html>
<head>
    <title>Регистрация</title>

    <style>
        body {
            background: #0b0b0b;
            color: white;
            font-family: Arial;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .box {
            border: 2px solid red;
            padding: 20px;
            border-radius: 15px;
            width: 300px;
            text-align: center;
        }

        input {
            width: 90%;
            padding: 10px;
            margin: 10px 0;
            background: #1a1a1a;
            border: 1px solid red;
            color: white;
            border-radius: 8px;
        }

        button {
            width: 95%;
            padding: 10px;
            background: red;
            border: none;
            color: white;
            border-radius: 8px;
            cursor: pointer;
        }

        h2 {
            color: red;
        }
    </style>
</head>

<body>

<div class="box">
    <h2>🏥 Регистрация</h2>

    <form method="POST">
        <input name="username" placeholder="Логин" required>
        <input name="password" type="password" placeholder="Пароль" required>
        <button type="submit">Создать аккаунт</button>
    </form>
</div>

</body>
</html>
