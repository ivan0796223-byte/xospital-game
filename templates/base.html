<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Xospital</title>
    <style>
        body {
            background: #0b0b0b;
            color: white;
            font-family: Arial;
            text-align: center;
        }

        .nav {
            background: #111;
            padding: 15px;
            border-bottom: 2px solid red;
        }

        a {
            color: white;
            margin: 10px;
            text-decoration: none;
        }

        .card {
            border: 2px solid red;
            border-radius: 10px;
            padding: 15px;
            margin: 10px;
            display: inline-block;
        }

        button {
            background: red;
            border: none;
            padding: 10px;
            color: white;
            border-radius: 8px;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="nav">
    <a href="/">🏠 Главная</a>
    <a href="/patients">👤 Пациенты</a>
</div>

{% block content %}{% endblock %}

</body>
</html>
