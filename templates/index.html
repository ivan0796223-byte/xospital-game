<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MEDICAL RP ONLINE</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#0b0b0b;
    color:white;
}

header{
    background:#111;
    padding:10px;
    border-bottom:2px solid red;
}

.container{
    padding:10px;
}

.panel{
    background:#1c1c1c;
    margin:10px 0;
    padding:10px;
    border-radius:10px;
}

h2{
    color:red;
}

input,select{
    width:100%;
    padding:10px;
    margin-top:5px;
    border:none;
    border-radius:6px;
}

button{
    background:red;
    color:white;
    border:none;
    padding:10px;
    margin-top:5px;
    border-radius:6px;
    cursor:pointer;
}

.list{
    background:#111;
    padding:8px;
    border-radius:8px;
    max-height:250px;
    overflow:auto;
}

.item{
    padding:6px;
    border-bottom:1px solid #222;
}

.progress{
    width:100%;
    height:10px;
    background:#333;
    border-radius:10px;
    overflow:hidden;
    margin-top:5px;
}

.bar{
    height:10px;
    background:red;
    width:0%;
}

.chat{
    background:black;
    height:150px;
    overflow:auto;
    padding:5px;
    border-radius:8px;
}

.msg{
    padding:4px;
    border-bottom:1px solid #222;
}
</style>
</head>

<body>

<header>
☩ MEDICAL RP ONLINE
</header>

<div class="container">

<!-- ВХОД -->
<div class="panel">
<h2>🔐 Регистрация / Вход</h2>

<input id="nickname" placeholder="Введите ник">
<button onclick="login()">Войти</button>

<div>
Игрок: <span id="playerName">Гость</span>
</div>
</div>

<!-- СТАТЫ -->
<div class="panel">
<h2>📊 Профиль</h2>

💰 Деньги: <span id="money">100</span><br
Алмазы: <span id="diamonds">10</span>

пыт: <span id="xp">0</span>

ровень: <span id="level">1</span>

лайн: <span id="online">127</span>

<div class="progress">
<div class="bar" id="xpBar"></div>
</div>
</div>

<!-- АВТОПАРК -->
<div class="panel">
<h2>🚑 Автопарк</h2>

<button onclick="loadCars()">Загрузить машины</button>

<div class="list" id="cars"></div>
</div>

<!-- ПАЦИЕНТЫ -->
<div class="panel">
<h2>🧑 Пациенты (2000)</h2>

<button onclick="loadPatients()">Загрузить пациентов</button>

<div class="list" id="patients"></div>
</div>

<!-- ОБМЕННИК -->
<div class="panel">
<h2>💱 Обменник</h2>

<button onclick="exchange()">Обменять 100💰 → 1💎</button>
</div>

<!-- ЧАТ -->
<div class="panel">
<h2>💬 Чат</h2>

<div class="chat" id="chat"></div>

<input id="chatInput" placeholder="Сообщение">
<button onclick="sendMessage()">Отправить</button>
</div>

</div>

<script>

let money = 100;
let diamonds = 10;
let xp = 0;
let level = 1;

// ОБНОВЛЕНИЕ
function updateStats(){

    document.getElementById("money").innerText = money;
    document.getElementById("diamonds").innerText = diamonds;
    document.getElementById("xp").innerText = xp;
    document.getElementById("level").innerText = level;

    let percent = xp % 100;
    document.getElementById("xpBar").style.width = percent + "%";

    level = Math.floor(xp / 100) + 1;
}

// ВХОД
function login(){

    let nick = document.getElementById("nickname").value;

    if(nick.trim() == "") return;

    document.getElementById("playerName").innerText = nick;
}

// МАШИНЫ
function loadCars(){

    let cars = document.getElementById("cars");
    cars.innerHTML = "";

    for(let i=1;i<=20;i++){

        let div = document.createElement("div");
        div.className = "item";
        div.innerText = "🚑 Машина #" + i;

        cars.appendChild(div);
    }
}

// ПАЦИЕНТЫ
function loadPatients(){

    let patients = document.getElementById("patients");
    patients.innerHTML = "";

    for(let i=1;i<=2000;i++){

        let div = document.createElement("div");
        div.className = "item";

        div.innerHTML = `
            🧑 Пациент #${i}
            <div class="progress">
                <div class="bar" id="b${i}"></div>
            </div>
        `;

        div.onclick = () => heal(i);

        patients.appendChild(div);
    }
}

// ЛЕЧЕНИЕ
function heal(id){

    let bar = document.getElementById("b"+id)
