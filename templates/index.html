<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MEDICAL RP</title>

<style>
body{
margin:0;
font-family:Arial;
background:#111;
color:white;
}

header{
background:#1c1c1c;
padding:15px;
text-align:center;
border-bottom:3px solid red;
}

.panel{
margin:15px;
padding:15px;
background:#1c1c1c;
border:2px solid red;
border-radius:12px;
}

input{
width:100%;
padding:10px;
margin-top:8px;
border:none;
border-radius:10px;
background:#222;
color:white;
}

button{
width:100%;
padding:12px;
margin-top:8px;
background:red;
border:none;
color:white;
border-radius:10px;
cursor:pointer;
}

button:hover{opacity:0.9;}

#game{display:none;}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
}

.small{
font-size:13px;
opacity:0.8;
}

.list{
height:150px;
overflow:auto;
background:#111;
padding:10px;
border-radius:10px;
}
</style>
</head>

<body>

<header>☩ MEDICAL RP ONLINE</header>

<!-- ГЛАВНАЯ -->
<div id="auth">

<div class="panel">
<h3>Регистрация</h3>
<input id="regL" placeholder="Логин">
<input id="regP" type="password" placeholder="Пароль">
<button onclick="register()">Создать аккаунт</button>
</div>

<div class="panel">
<h3>Вход</h3>
<input id="logL" placeholder="Логин">
<input id="logP" type="password" placeholder="Пароль">
<button onclick="login()">Войти</button>
</div>

</div>

<!-- ИГРА -->
<div id="game">

<div class="panel grid">

<div>
<h3>💎 Баланс</h3>
<p>Алмазы: <span id="diamonds">50</span></p>
<p>Монеты: <span id="coins">0</span></p>
</div>

<div>
<h3>🏥 Больница</h3>
<p>Палаты: <span id="rooms">10</span></p>
<p>Лаборатории: <span id="labs">1</span></p>
<p>Машины: <span id="cars">3</span></p>
</div>

</div>

<div class="panel">

<h3>👨‍⚕️ Пациенты (2000)</h3>
<div class="list" id="patients"></div>

</div>

<div class="panel">

<h3>🏥 Магазин улучшений</h3>

<button onclick="buyRoom()">Купить палату (10💎)</button>
<button onclick="buyLab()">Купить лабораторию (20💎)</button>
<button onclick="buyCar()">Купить машину (15💎)</button>

</div>

</div>

<script>

let diamonds = 50;
let coins = 0;
let rooms = 10;
let labs = 1;
let cars = 3;

function register(){
let l = regL.value;
let p = regP.value;

if(!l || !p){
alert("Заполните поля");
return;
}

localStorage.setItem("u", l);
localStorage.setItem("p", p);

alert("Аккаунт создан");
}

function login(){

let l = logL.value;
let p = logP.value;

if(l === localStorage.getItem("u") &&
p === localStorage.getItem("p")){

auth.style.display="none";
game.style.display="block";
initGame();

}else{
alert("Ошибка входа");
}

}

// 2000 пациентов (виртуально, без лагов)
function initGame(){

let html="";
for(let i=1;i<=2000;i++){
html += "Пациент #" + i + " - статус: ожидает
";
}
p
nts.innerHTML = html;

updateUI();
}

function updateUI(){
diamondsEl.innerText = diamonds;
coinsEl.innerText = coins;
roomsEl.innerText = rooms;
labsEl.innerText = labs;
carsEl.innerText = cars;
}

function buyRoom(){
if(diamonds < 10){alert("Нет алмазов"); return;}
diamonds -= 10;
rooms += 1;
updateUI();
}

function buyLab(){
if(diamonds < 20){alert("Нет алмазов"); return;}
diamonds -= 20;
labs += 1;
updateUI();
}

function buyCar(){
if(diamonds < 15){alert("Нет алмазов"); return;}
diamonds -= 15;
cars += 1;
updateUI();
}

</script>

</body>
</html>
