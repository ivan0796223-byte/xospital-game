<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Xospital Game</title>
</head>
<body>

<h1>🏥 Xospital Game</h1>

<p>💰 Деньги: <span id="money"></span></p>
<p>⭐ XP: <span id="xp"></span></p>
<p>🏆 Уровень: <span id="level"></span></p>

<!-- 🔥 КНОПКА ОБНОВЛЕНИЯ -->
<button onclick="loadData()">🔄 Обновить</button>

<script>
async function loadData(){
    let res = await fetch("/data")
    let d = await res.json()

    document.getElementById("money").innerText = d.money
    document.getElementById("xp").innerText = d.xp
    document.getElementById("level").innerText = d.level
}

// автозагрузка при входе
loadData()
</script>

</body>
</html>
