<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Xospital</title>

<style>
body {
    margin:0;
    font-family:Arial;
    background:#0b1220;
    color:white;
}

.header {
    padding:15px;
    background:#111827;
}

.container {
    display:flex;
    gap:15px;
    padding:15px;
}

.card {
    flex:1;
    background:#1e293b;
    padding:15px;
    border-radius:12px;
}

.bar {
    width:100%;
    height:12px;
    background:#334155;
    border-radius:10px;
}

.fill {
    height:100%;
    background:#22c55e;
}

button {
    width:100%;
    padding:10px;
    margin-top:10px;
    border:none;
    border-radius:8px;
    background:#3b82f6;
    color:white;
}
</style>
</head>

<body>

<div class="header">
    🏥 Xospital Game
</div>

<div class="container">

    <div class="card">
        <h3>🦠 ОРВИ</h3>
        <div class="bar"><div class="fill" style="width:80%"></div></div>
        <p>80%</p>
    </div>

    <div class="card">
        <h3>📈 XP</h3>
        <div class="bar"><div class="fill" style="width:40%"></div></div>
        <p>40/100</p>

        <button onclick="act()">💉 Лечить</button>
    </div>

    <div class="card">
        <h3>💎 Алмазы</h3>
        <button onclick="act()">+1</button>
    </div>

</div>

<script>
function act() {
    fetch("/action", {method:"POST"})
    .then(() => location.reload());
}
</script>

</body>
</html>
