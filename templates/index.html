<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MEDICAL RP PRO+</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#0b0b0b;
    color:white;
}

.container{padding:10px;}

.panel{
    background:#1c1c1c;
    padding:10px;
    margin:10px 0;
    border-radius:10px;
}

h2{color:red;}

.list{
    background:#111;
    padding:10px;
    border-radius:8px;
    max-height:300px;
    overflow:auto;
}

.item{
    padding:8px;
    border-bottom:1px solid #222;
    cursor:pointer;
}

.item:hover{background:#222;}

.bad{color:red;}
.good{color:lime;}
.warn{color:orange;}

.progress{
    width:100%;
    height:8px;
    background:#333;
    border-radius:10px;
    overflow:hidden;
}

.bar{
    height:8px;
    background:red;
    width:0%;
}
</style>
</head>

<body>

<div class="container">

<!-- 📊 СТАТ -->
<div class="panel">
<h2>📊 Система</h2>

💰 Деньги: <span id="money">100</span><br
XP: <span id="xp">0</span><br
Онлайн: <span id="online">12</span>
</div>

<!-- 🧑 ВРАЧ -->
<div class="panel">
<h2>🏥 Роль</h2>
<button onclick="setRole('doctor')">Стать врачом</button>
<button onclick="setRole('surgeon')">Стать хирургом</button>
<div>Роль: <span id="role">нет</span></div>
</div>

<!-- 🧑 ПАЦИЕНТЫ -->
<div class="panel">
<h2>🧑 Пациенты</h2>
<button onclick="loadPatients()">Загрузить пациентов</button>
<div class="list" id="patients"></div>
</div>

</div>

<script>

let money = 100;
let xp = 0;
let role = "none";

// болезни
const diseases = [
    {name:"Грипп", level:1, reward:10},
    {name:"Пневмония", level:2, reward:20},
    {name:"Травма", level:2, reward:25},
    {name:"Сердечный приступ", level:3, reward:50}
];

// онлайн (фейк)
document.getElementById("online").innerText = Math.floor(Math.random()*40+10);

// роль
function setRole(r){
    role = r;
    document.getElementById("role").innerText = r;
}

// пациенты
function loadPatients(){
    let box=document.getElementById("patients");
    box.innerHTML="";

    for(let i=1;i<=30;i++){

        let d = diseases[Math.floor(Math.random()*diseases.length)];

        let time = 10 + d.level * 5;

        let div=document.createElement("div");
        div.className="item";

        div.innerHTML=`
            🧑 Пациент #${i}

    
    <span class="warn">Болезнь: ${d.name}</span>

    
    💉 Сложность: ${d.level}

     
   💰 Награда: ${d.reward}
            <div class="progress"><div class="bar" id="b${i}"></div></div>
        `;

        div.onclick=()=>heal(i,d,time);

        box.appendChild(div);
    }
}

// лечение
function heal(id,d,time){

    let bar=document.getElementById("b"+id);

    if(!bar) return;

    let progress=0;

    let interval=setInterval(()=>{

        progress += 100/(time*2);

        bar.style.width=progress+"%";

        if(progress>=100){

            clearInterval(interval);

            // награда
            money += d.reward;
            xp += d.level * 10;

            document.getElementById("money").innerText=money;
            document.getElementById("xp").innerText=xp;

            bar.style.background="lime";

        }

    },500);
}

</script>

</body>
</html>
