<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MEDICAL RP PRO MAX</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#0b0b0b;
    color:white;
}

.container{padding:10px;}

.panel{
    background:#1c1c1c;
    padding:10px;
    margin:10px 0;
    border-radius:10px;
}

h2{color:red;}

button{
    background:red;
    color:white;
    border:none;
    padding:10px;
    margin-top:5px;
    border-radius:6px;
    cursor:pointer;
}

select{
    width:100%;
    padding:8px;
    margin-top:5px;
}

.log{
    height:140px;
    overflow:auto;
    background:black;
    padding:5px;
    border-radius:8px;
}

.msg{
    font-size:12px;
    border-bottom:1px solid #222;
    padding:3px;
}

.grid{
    display:flex;
    flex-wrap:wrap;
    gap:6px;
}

.box{
    background:#111;
    padding:6px;
    border-radius:6px;
    font-size:12px;
}
</style>
</head>

<body>

<div class="container">

<!-- 🚑 МАШИНЫ -->
<div class="panel">
<h2>🚑 Автопарк</h2>
<div class="grid" id="cars"></div>
<button onclick="loadCars()">Загрузить машины</button>
</div>

<!-- 🧑 ПАЦИЕНТЫ -->
<div class="panel">
<h2>🧑‍🤝‍🧑 Пациенты (2000)</h2>

<select id="patients"></select>
<button onclick="loadPatients()">Загрузить пациентов</button>
<button onclick="sendToSurgery()">Отправить в операционную</button>
</div>

<!-- 🏥 ОПЕРАЦИОННАЯ -->
<div class="panel">
<h2>🏥 Операционная очередь</h2>
<div id="surgery"></div>
</div>

<!-- 🧪 ЛАБА -->
<div class="panel">
<h2>🧪 Лаборатория</h2>
<button onclick="produce()">Производство медикаментов</button>
</div>

<!-- 📜 ЛОГ -->
<div class="panel">
<h2>📜 Журнал</h2>
<div class="log" id="log"></div>
</div>

</div>

<script>

function log(text){
    let l = document.getElementById("log");
    let div = document.createElement("div");
    div.className="msg";
    div.innerText=text;
    l.appendChild(div);
    l.scrollTop=l.scrollHeight;
}

// 🚑 МАШИНЫ
function loadCars(){
    let cars = document.getElementById("cars");
    cars.innerHTML="";

    let list = ["🚑 Ambulance A","🚑 Ambulance B","🚑 Ambulance C","🚑 Ambulance D"];

    list.forEach(c=>{
        let d=document.createElement("div");
        d.className="box";
        d.innerText=c;
        cars.appendChild(d);
    });

    log("🚑 Автопарк загружен");
}

// 🧑 ПАЦИЕНТЫ 2000 (оптимизировано)
function loadPatients(){
    let sel=document.getElementById("patients");
    sel.innerHTML="";

    for(let i=1;i<=2000;i++){
        let opt=document.createElement("option");
        opt.textContent="Пациент #" + i;
        sel.appendChild(opt);
    }

    log("🧑 Загружено 2000 пациентов");
}

// 🏥 В ОПЕРАЦИОННУЮ
function sendToSurgery(){
    let sel=document.getElementById("patients");
    let surgery=document.getElementById("surgery");

    let p=sel.value;

    let div=document.createElement("div");
    div.className="box";
    div.innerText="🏥 " + p + " → операция";

    surgery.appendChild(div);

    log("➡ " + p + " отправлен в операционную");
}

// 🧪 ПРОИЗВОДСТВО
function produce(){
    let meds = Math.floor(Math.random()*5)+1;

    log("🧪 Производство: +" + meds + " медикаментов");
}

</script>

</body>
</html>
