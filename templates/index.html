<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MEDICAL RP NO POPUP</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#0b0b0b;
    color:white;
}

.container{padding:10px;}

.panel{
    background:#1c1c1c;
    padding:10px;
    margin:10px 0;
    border-radius:10px;
}

h2{color:red;}

button{
    background:red;
    color:white;
    border:none;
    padding:10px;
    margin-top:5px;
    border-radius:6px;
    cursor:pointer;
}

.stat{
    display:flex;
    gap:10px;
    flex-wrap:wrap;
}

.box{
    background:#111;
    padding:10px;
    border-radius:8px;
    flex:1;
    min-width:100px;
}

.progress{
    width:100%;
    height:10px;
    background:#333;
    border-radius:10px;
    overflow:hidden;
}

.bar{
    height:10px;
    background:red;
    width:0%;
}

.log{
    height:150px;
    overflow:auto;
    background:black;
    padding:5px;
    border-radius:8px;
}

.msg{
    font-size:12px;
    padding:3px;
    border-bottom:1px solid #222;
}
</style>
</head>

<body>

<div class="container">

<!-- 📊 СТАТЫ -->
<div class="panel">
<h2>📊 Игрок</h2>

<div class="stat">
<div class="box">💰 <span id="money">100</span></div>
<div class="box">💎 <span id="diamonds">10</span></div>
<div class="box">⭐ <span id="xp">0</span></div>
</div>

<div class="progress">
<div class="bar" id="bar"></div>
</div>
</div>

<!-- 🎮 ДЕЙСТВИЯ -->
<div class="panel">
<h2>🎮 Действия</h2>

<button onclick="dice()">Кубик</button>
<button onclick="ambulance()">Скорая</button>
<button onclick="alliance()">Союз</button>
<button onclick="buy()">Магазин</button>
</div>

<!-- 📜 ЛОГ -->
<div class="panel">
<h2>📜 Журнал действий</h2>
<div class="log" id="log"></div>
</div>

</div>

<script>

let money = 100;
let diamonds = 10;
let xp = 0;

function update(){
    document.getElementById("money").innerText = money;
    document.getElementById("diamonds").innerText = diamonds;
    document.getElementById("xp").innerText = xp;

    document.getElementById("bar").style.width = (xp % 100) + "%";
}

function log(text){
    let l = document.getElementById("log");

    let div = document.createElement("div");
    div.className = "msg";
    div.innerText = text;

    l.appendChild(div);
    l.scrollTop = l.scrollHeight;
}

// 🎲 КУБИК
function dice(){
    let r = Math.floor(Math.random()*6)+1;

    xp += 10;
    money += 5;

    log("🎲 Кубик: " + r + " (+10 XP, +5💰)");
    update();
}

// 🚑 СКОРАЯ
function ambulance(){
    xp += 15;
    money += 10;

    log("🚑 Скорая выехала (+XP +💰)");
    update();
}

// 🤝 СОЮЗ
function alliance(){
    if(diamonds < 5){
        log("❌ Не хватает 💎");
        return;
    }

    diamonds -= 5;
    xp += 20;

    log("🤝 Союз создан (-5💎 +20 XP)");
    update();
}

// 🛒 МАГАЗИН
function buy(){
    if(money < 20){
        log("❌ Недостаточно 💰");
        return;
    }

    money -= 20;
    xp += 25;

    log("🛒 Куплено оборудование (-20💰 +XP)");
    update();
}

update();

</script>

</body>
</html>
