<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MEDICAL RP LOGIN</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#0b0b0b;
    color:white;
}

/* ЭКРАН ВХОДА */
#loginScreen{
    position:fixed;
    inset:0;
    background:#0b0b0b;
    display:flex;
    justify-content:center;
    align-items:center;
    z-index:1000;
}

.loginBox{
    width:320px;
    background:#1c1c1c;
    padding:20px;
    border-radius:12px;
    border:2px solid red;
}

.loginTitle{
    text-align:center;
    font-size:24px;
    color:red;
    margin-bottom:15px;
}

input{
    width:100%;
    padding:10px;
    margin-top:8px;
    border:none;
    border-radius:6px;
    box-sizing:border-box;
}

button{
    width:100%;
    padding:10px;
    margin-top:10px;
    border:none;
    border-radius:6px;
    background:red;
    color:white;
    cursor:pointer;
}

/* ИГРА */
header{
    background:#111;
    padding:10px;
    border-bottom:2px solid red;
}

.container{
    padding:10px;
}

.panel{
    background:#1c1c1c;
    margin:10px 0;
    padding:10px;
    border-radius:10px;
}

h2{
    color:red;
}

.progress{
    width:100%;
    height:10px;
    background:#333;
    border-radius:10px;
    overflow:hidden;
    margin-top:5px;
}

.bar{
    height:10px;
    background:red;
    width:0%;
}

.list{
    background:#111;
    border-radius:8px;
    max-height:250px;
    overflow:auto;
    padding:5px;
}

.item{
    padding:6px;
    border-bottom:1px solid #222;
}

.chat{
    background:black;
    height:150px;
    overflow:auto;
    border-radius:8px;
    padding:5px;
}

.msg{
    padding:4px;
    border-bottom:1px solid #222;
}
</style>
</head>

<body>

<!-- 🔐 ОТДЕЛЬНЫЙ ЭКРАН -->
<div id="loginScreen">

    <div class="loginBox">

        <div class="loginTitle">
            ☩ MEDICAL RP
        </div>

        <input id="loginName" placeholder="Никнейм">
        <input id="loginPassword" type="password" placeholder="Пароль">

        <button onclick="register()">Регистрация</button>
        <button onclick="login()">Войти</button>

    </div>

</div>

<!-- 🎮 ИГРА -->
<div id="game" style="display:none;">

<header>
☩ MEDICAL RP ONLINE
</header>

<div class="container">

<!-- ПРОФИЛЬ -->
<div class="panel">
<h2>📊 Профиль</h2>

👤 Игрок: <span id="playerName"></span>

еньги: <span id="money">100</span>

мазы: <span id="diamonds">10</span>

⭐
 <span id="xp">0</span>

🏆
вень: <span id="level">1</span>

🌐 
йн: <span id="online">148</span>

<div class="progress">
<div class="bar" id="xpBar"></div>
</div>
</div>

<!-- ПАЦИЕНТЫ -->
<div class="panel">
<h2>🧑 Пациенты</h2>

<button onclick="loadPatients()">Загрузить пациентов</button>

<div class="list" id="patients"></div>
</div>

<!-- ЧАТ -->
<div class="panel">
<h2>💬 Чат</h2>

<div class="chat" id="chat"></div>

<input id="chatInput" placeholder="Сообщение">
<button onclick="sendMessage()">Отправить</button>
</div>

</div>

</div>

<script>

let money = 100;
let diamonds = 10;
let xp = 0;
let level = 1;

// РЕГИСТРАЦИЯ
function register(){

    let name = document.getElementById("loginName").value;
    let pass = document.getElementById("loginPassword").value;

    if(name.trim()=="" || pass.trim()=="") return;

    localStorage.setItem("rp_name", name);
    localStorage.setItem("rp_pass", pass);
}

// ВХОД
function login(){

    let name = document.getElementById("loginName").value;
    let pass = document.getElementById("loginPassword").value;

    let savedName = localStorage.getItem("rp_name");
    let savedPass = localStorage.getItem("rp_pass");

    if(name == savedName && pass == savedPass){

        document.getElementById("loginScreen").style.display="none";
        document.getElementById("game").style.display="block";

        document.getElementById("playerName").innerText = name;
    }
}

// XP
function update(){

    level = Math.floor(xp / 100) + 1;

    document.getElementById("money").innerText = money;
    document.getElementById("diamonds").innerText = diamonds;
