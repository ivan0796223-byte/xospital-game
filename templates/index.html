<!DOCTYPE html>
<html>
<head>
<style>
body{
background:#0b1220;
color:white;
font-family:Arial;
margin:0;
padding:20px;
}

.card{
background:#111a2e;
padding:15px;
margin:10px 0;
border-radius:15px;
}

button{
padding:10px;
border-radius:10px;
border:none;
margin:5px;
background:#22c55e;
color:white;
cursor:pointer;
}

.circle{
width:50px;
height:50px;
border-radius:50%;
background:#1f2937;
display:inline-block;
text-align:center;
line-height:50px;
margin:5px;
}
</style>
</head>

<body>

<h2>🏥 Hospital Game</h2>

<div class="card">
👤 {{user.username}} <br><br>
💰 {{user.coins}} 💎 {{user.diamonds}}<br>
⭐ Level {{user.level}}<br>

<progress value="{{user.exp}}" max="{{user.level*100}}"></progress>
</div>

<div class="card">
<a href="/patients"><button>📋 Patients</button></a>
<a href="/chat"><button>💬 Chat</button></a>
<a href="/surgery"><button>🏥 Surgery</button></a>
<a href="/lab"><button>🧪 Lab</button></a>
<a href="/exchange"><button>💱 Exchange</button></a>
<a href="/reward"><button>🎁 Reward</button></a>
</div>

<div class="card">
🚗 Auto Park:
<div class="circle">🚑</div>
<div class="circle">🚗</div>
<div class="circle">🚓</div>
</div>

<div class="card">
👥 Online: <span id="online">0</span>
</div>

<script>
setInterval(()=>{
fetch("/online")
.then(r=>r.json())
.then(d=>{
document.getElementById("online").innerText = d.online;
});
},2000);
</script>

</body>
</html>
