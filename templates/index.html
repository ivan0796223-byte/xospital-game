<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MEDICAL RP</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#111;
    color:white;
}

header{
    background:#1a1a1a;
    border-bottom:3px solid red;
    padding:15px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.logo{
    color:red;
    font-size:28px;
    font-weight:bold;
}

.top-info{
    display:flex;
    gap:15px;
    flex-wrap:wrap;
}

.top-box{
    background:#222;
    padding:8px 12px;
    border-radius:12px;
    border:1px solid red;
}

.level-box{
    padding:15px;
}

.level-bar{
    width:100%;
    height:20px;
    background:#222;
    border-radius:12px;
    overflow:hidden;
}

.level-fill{
    width:67%;
    height:100%;
    background:red;
}

nav{
    padding:15px;
    display:flex;
    gap:10px;
    flex-wrap:wrap;
}

button{
    background:#1f1f1f;
    color:white;
    border:2px solid red;
    border-radius:14px;
    padding:10px 15px;
    cursor:pointer;
    transition:0.2s;
}

button:hover{
    background:red;
}

.main{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
    gap:15px;
    padding:15px;
}

.panel{
    background:#1b1b1b;
    border:2px solid red;
    border-radius:20px;
    padding:15px;
}

.panel h2{
    color:red;
}

.card{
    background:#262626;
    margin-top:10px;
    padding:10px;
    border-radius:12px;
}

input{
    width:100%;
    margin-top:10px;
    padding:10px;
    border-radius:12px;
    border:1px solid red;
    background:#111;
    color:white;
}

.chat-box{
    height:180px;
    overflow:auto;
    background:#101010;
    border-radius:12px;
    padding:10px;
    margin-bottom:10px;
}

.message{
    background:#222;
    padding:8px;
    border-radius:10px;
    margin-top:5px;
}

.round-icons{
    display:flex;
    gap:10px;
    flex-wrap:wrap;
}

.icon{
    width:70px;
    height:70px;
    border-radius:50%;
    background:#222;
    border:2px solid red;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:28px;
}

footer{
    margin-top:20px;
    border-top:3px solid red;
    padding:15px;
    text-align:center;
}
</style>
</head>

<body>

<header>
    <div class="logo">☩ MEDICAL RP</div>

    <div class="top-info">
        <div class="top-box">👥 Онлайн: 728</div>
        <div class="top-box">🪙 120000</div>
        <div class="top-box">💎 950</div>
        <div class="top-box">⭐ LVL 18</div>
    </div>
</header>

<div class="level-box">
    <div>Опыт до следующего уровня</div>
    <div class="level-bar">
        <div class="level-fill"></div>
    </div>
</div>

<nav>
    <button>Палаты</button>
    <button>Автопарк</button>
    <button>Операционная</button>
    <button>Лаборатория</button>
    <button>Магазин</button>
    <button>Кабинет доктора</button>
    <button>Союзы</button>
</nav>

    <div class="panel">
        <h2>🔐 Регистрация / Вход</h2>

        <input placeholder="Логин">
        <input placeholder="Пароль" type="password">

        <button>Войти</button>
        <button>Регистрация</button>
    </div>

    <div class="panel">
        <h2>🚑 Вызовы пациентов</h2>

        <div class="card">Пациент #1001 — ДТП</div>
        <div class="card">Пациент #1002 — Инфаркт</div>
        <div class="card">Пациент #1003 — Отравление</div>
    </div>

    <div class="panel">
        <h2>🏥 Палаты</h2>

        <button>Список палат</button>
        <button>Выбрать пациентов</button>

        <div class="card">
            Всего пациентов: 2000
        </div>
    </div>

    <div class="panel">
        <h2>🚗 Автопарк</h2>

        <div class="round-icons">
            <div class="icon">🚑</div>
            <div class="icon">🚓</div>
            <div class="icon">🚐</div>
        </div>
    </div>

    <div class="panel">
        <h2>🧪 Лаборатория</h2>

        <button>Исследование</button>
        <button>Взять образец</button>
