<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Xospital Game</title>
</head>
<body>

<h1>🏥 Xospital Game</h1>

<p id="status">Игра загружена</p>

<!-- 🔄 КНОПКА ОБНОВЛЕНИЯ -->
<button onclick="refreshGame()">🔄 Обновить</button>

<script>
function refreshGame() {
    fetch("/refresh")
        .then(response => response.text())
        .then(data => {
            document.getElementById("status").innerText = "Обновлено ✔";
            location.reload(); // перезагрузка страницы
        });
}
</script>

</body>
</html>
