<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MEDICAL RP ECONOMY</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#0b0b0b;
    color:white;
}

.container{padding:10px;}

.panel{
    background:#1c1c1c;
    padding:10px;
    margin:10px 0;
    border-radius:10px;
}

h2{color:red;}

button{
    background:red;
    color:white;
    border:none;
    padding:10px;
    margin-top:5px;
    border-radius:6px;
}

.progress{
    width:100%;
    height:10px;
    background:#333;
    border-radius:10px;
    overflow:hidden;
}

.bar{
    height:10px;
    background:red;
    width:0%;
}

.stat{
    display:flex;
    gap:10px;
    flex-wrap:wrap;
}

.box{
    background:#111;
    padding:10px;
    border-radius:8px;
    flex:1;
    min-width:100px;
}
</style>
</head>

<body>

<div class="container">

<!-- 💰 СТАТЫ -->
<div class="panel">
<h2>📊 Игрок</h2>

<div class="stat">
<div class="box">💰 Монеты: <span id="money">100</span></div>
<div class="box">💎 Алмазы: <span id="diamonds">10</span></div>
<div class="box">⭐ XP: <span id="xp">0</span></div>
</div>

<div class="progress">
<div class="bar" id="bar"></div>
</div>
</div>

<!-- 🎲 КУБИК -->
<div class="panel">
<h2>🎲 Операционная</h2>
<button onclick="dice()">Кинуть кубик (+XP)</button>
</div>

<!-- 🤝 СОЮЗ -->
<div class="panel">
<h2>🤝 Союз</h2>
<button onclick="alliance()">Создать союз (-5💎)</button>
</div>

<!-- 🚑 СКОРАЯ -->
<div class="panel">
<h2>🚑 Автопарк</h2>
<button onclick="ambulance()">Вызвать скорую (+XP)</button>
</div>

<!-- 💎 МАГАЗИН -->
<div class="panel">
<h2>🛒 Магазин</h2>
<button onclick="buy()">Купить оборудование (-20💰 +XP)</button>
</div>

</div>

<script>

// ===== ДАННЫЕ =====
let money = 100;
let diamonds = 10;
let xp = 0;

// ===== ОБНОВЛЕНИЕ UI =====
function update(){
    document.getElementById("money").innerText = money;
    document.getElementById("diamonds").innerText = diamonds;
    document.getElementById("xp").innerText = xp;

    let percent = xp % 100;
    document.getElementById("bar").style.width = percent + "%";
}

// ===== КУБИК =====
function dice(){
    let r = Math.floor(Math.random()*6)+1;

    xp += 10;
    money += 5;

    alert("Выпало: " + r + " (+10 XP, +5💰)");
    update();
}

// ===== СОЮЗ =====
function alliance(){
    if(diamonds < 5){
        alert("Нет алмазов!");
        return;
    }

    diamonds -= 5;
    xp += 20;

    alert("Союз создан (-5💎 +20 XP)");
    update();
}

// ===== СКОРАЯ =====
function ambulance(){
    xp += 15;
    money += 10;

    alert("Скорая выехала (+XP +💰)");
    update();
}

// ===== МАГАЗИН =====
function buy(){
    if(money < 20){
        alert("Недостаточно денег!");
        return;
    }

    money -= 20;
    xp += 25;

    alert("Оборудование куплено (-20💰 +XP)");
    update();
}

// старт
update();

</script>

</body>
</html>
