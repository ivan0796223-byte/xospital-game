<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MEDICAL RP</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#0b0b0b;
    color:white;
}

.container{padding:10px;}

.panel{
    background:#1c1c1c;
    padding:10px;
    margin:10px 0;
    border-radius:10px;
}

h2{color:red;}

.list{
    background:#111;
    padding:10px;
    border-radius:8px;
    max-height:300px;
    overflow:auto;
}

.item{
    padding:8px;
    border-bottom:1px solid #222;
    cursor:pointer;
}

.item:hover{
    background:#222;
}

.status{
    font-size:12px;
    color:lime;
}

.progress{
    width:100%;
    height:8px;
    background:#333;
    border-radius:10px;
    overflow:hidden;
    margin-top:5px;
}

.bar{
    height:8px;
    background:red;
    width:0%;
}
</style>
</head>

<body>

<div class="container">

<!-- 🧑 ПАЦИЕНТЫ -->
<div class="panel">
<h2>🧑 Пациенты (клик = лечение)</h2>
<button onclick="loadPatients()">Загрузить пациентов</button>
<div class="list" id="patients"></div>
</div>

</div>

<script>

let healing = {}; // кто лечится

// 🧑 загрузка пациентов
function loadPatients(){
    let box=document.getElementById("patients");
    box.innerHTML="";

    for(let i=1;i<=50;i++){

        let div=document.createElement("div");
        div.className="item";
        div.id="p"+i;

        div.innerHTML=`
            🧑 Пациент #${i}
            <div class="status" id="s${i}">Готов к лечению</div>
            <div class="progress"><div class="bar" id="b${i}"></div></div>
        `;

        div.onclick=()=>startHeal(i);

        box.appendChild(div);
    }
}

// 🏥 лечение при клике
function startHeal(id){

    if(healing[id]) return; // уже лечится

    healing[id]=0;

    let timer=setInterval(()=>{

        healing[id]+=10;

        let bar=document.getElementById("b"+id);
        let status=document.getElementById("s"+id);

        if(bar) bar.style.width=healing[id]+"%";
        if(status) status.innerText="Лечение: " + healing[id] + "%";

        if(healing[id]>=100){

            clearInterval(timer);
            delete healing[id];

            if(status) status.innerText="✅ Пациент здоров";
            if(bar) bar.style.width="100%";

        }

    },500);
}

</script>

</body>
</html>
