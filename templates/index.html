<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Medical RP Chat</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #111;
    color: white;
}

.panel {
    position: fixed;
    bottom: 0;
    width: 100%;
    background: #1c1c1c;
    padding: 10px;
    box-sizing: border-box;
}

#chat-box {
    height: 300px;
    overflow-y: auto;
    padding: 10px;
    background: #000;
}

.message {
    padding: 5px;
    margin: 5px 0;
    background: #2a2a2a;
    border-radius: 5px;
}

input {
    width: 75%;
    padding: 10px;
    border: none;
    outline: none;
}

button {
    width: 23%;
    padding: 10px;
    border: none;
    background: red;
    color: white;
    cursor: pointer;
}
</style>
</head>

<body>

<div id="chat-box"></div>

<div class="panel">
    <input id="chat-input" placeholder="Сообщение">
    <button onclick="sendMessage()">Отправить</button>
</div>

<script>
function sendMessage() {
    const input = document.getElementById("chat-input");
    const box = document.getElementById("chat-box");

    const text = input.value.trim();

    if (text === "") return;

    const msg = document.createElement("div");
    msg.className = "message";
    msg.textContent = "Игрок: " + text;

    box.appendChild(msg);

    input.value = "";
    box.scrollTop = box.scrollHeight;
}
</script>

</body>
</html>
