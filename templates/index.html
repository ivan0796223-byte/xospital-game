<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>MEDICAL RP</title>

<style>

body{
    margin:0;
    background:#0b0b0b;
    color:white;
    font-family:Arial;
}

/* LOGIN */

#loginScreen{
    position:fixed;
    inset:0;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#0b0b0b;
}

.loginBox{
    width:300px;
    background:#1c1c1c;
    padding:20px;
    border-radius:10px;
    border:2px solid red;
}

input{
    width:100%;
    padding:10px;
    margin-top:10px;
    border:none;
    border-radius:6px;
    box-sizing:border-box;
}

button{
    width:100%;
    padding:10px;
    margin-top:10px;
    background:red;
    color:white;
    border:none;
    border-radius:6px;
    cursor:pointer;
}

#status{
    margin-top:10px;
    text-align:center;
}

/* GAME */

#game{
    display:none;
    padding:20px;
}

.panel{
    background:#1c1c1c;
    padding:10px;
    border-radius:10px;
}

</style>
</head>

<body>

<!-- LOGIN -->

<div id="loginScreen">

    <div class="loginBox">

        <h2>☩ MEDICAL RP</h2>

        <input id="name" placeholder="Логин">

        <input
            id="pass"
            type="password"
            placeholder="Пароль"
        >

        <button onclick="register()">
            Регистрация
        </button>

        <button onclick="login()">
            Войти
        </button>

        <div id="status"></div>

    </div>

</div>

<!-- GAME -->

<div id="game">

    <div class="panel">

        <h1>
            Добро пожаловать,
            <span id="player"></span>
        </h1>

        <p>🏥 MEDICAL RP загружен</p>

    </div>

</div>

<script>

// регистрация
function register(){

    let name =
        document.getElementById("name").value;

    let pass =
        document.getElementById("pass").value;

    if(name.trim()=="" || pass.trim()==""){

        status("Введите данные","red");
        return;
    }

    localStorage.setItem("rp_name",name);
    localStorage.setItem("rp_pass",pass);

    status("Аккаунт создан","lime");
}

// вход
function login(){

    let name =
        document.getElementById("name").value;

    let pass =
        document.getElementById("pass").value;

    let savedName =
        localStorage.getItem("rp_name");

    let savedPass =
        localStorage.getItem("rp_pass");

    if(name === savedName && pass === savedPass){

        // скрываем логин
        document.getElementById("loginScreen")
            .style.display="none";

        // показываем игру
        document.getElementById("game")
            .style.display="block";

        // ник
        document.getElementById("player")
            .innerText=name;

        return;
    }

    status("Неверный логин","red");
}

// статус
function status(text,color){

    let s=document.getElementById("status");

    s.innerText=text;
    s.style.color=color;
}

</script>

</body>
</html>
