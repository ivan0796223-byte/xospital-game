<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MEDICAL RP</title>

<style>
body{
    margin:0;
    background:#111;
    color:white;
    font-family:Arial;
}

header{
    background:#1c1c1c;
    padding:15px;
    text-align:center;
    border-bottom:3px solid red;
    font-size:22px;
}

.panel{
    margin:15px;
    padding:15px;
    background:#1c1c1c;
    border:2px solid red;
    border-radius:15px;
}

input{
    width:100%;
    padding:12px;
    margin-top:8px;
    border:none;
    border-radius:10px;
    background:#222;
    color:white;
    box-sizing:border-box;
}

button{
    width:100%;
    padding:12px;
    margin-top:8px;
    background:red;
    border:none;
    color:white;
    border-radius:10px;
    font-size:16px;
}

button:hover{opacity:0.9;}

#game{display:none;}

.chat{
    height:120px;
    overflow:auto;
    background:#111;
    padding:10px;
    border-radius:10px;
    margin-top:10px;
}

.small{
    font-size:13px;
    opacity:0.8;
}
</style>
</head>

<body>

<header>☩ MEDICAL RP ONLINE</header>

<div class="panel">

<h3>Регистрация</h3>
<input id="regLogin" placeholder="Логин">
<input id="regPass" type="password" placeholder="Пароль">
<button onclick="register()">Регистрация</button>

<hr style="border:1px solid #333;margin:10px 0;">

<h3>Вход</h3>
<input id="logLogin" placeholder="Логин">
<input id="logPass" type="password" placeholder="Пароль">
<button onclick="login()">Войти</button>

</div>

<div id="game">

<div class="panel">

<h3>🏥 Больница</h3>

<div class="small">2000 палат | 2000 машин | пациенты онлайн</div>

</div>

<div class="panel">

<h3>💬 Чат пациентов</h3>
<div class="chat" id="chat"></div>

<input id="msg" placeholder="Сообщение">
<button onclick="send()">Отправить</button>

</div>

</div>

<script>

function register(){

let l = document.getElementById("regLogin").value;
let p = document.getElementById("regPass").value;

if(!l || !p){
alert("Заполните поля");
return;
}

localStorage.setItem("user_login", l);
localStorage.setItem("user_pass", p);

alert("Регистрация успешна");
}

function login(){

let l = document.getElementById("logLogin").value;
let p = document.getElementById("logPass").value;

let savedL = localStorage.getItem("user_login");
let savedP = localStorage.getItem("user_pass");

if(!savedL || !savedP){
alert("Сначала зарегистрируйтесь");
return;
}

if(l === savedL && p === savedP){
document.getElementById("game").style.display = "block";
}else{
alert("Неверный логин или пароль");
}

}

function send(){

let m = document.getElementById("msg");

if(!m.value) return;

document.getElementById("chat").innerHTML += "<p>👤 " + m.value + "</p>";

m.value = "";
}

</script>

</body>
</html>
