<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Hospital Game</title>

<style>
body {
    background:#0b1220;
    color:white;
    font-family:Arial;
    margin:0;
    padding:20px;
}

.card {
    background:#111a2e;
    padding:15px;
    margin:10px 0;
    border-radius:15px;
}

button {
    padding:10px;
    border-radius:10px;
    border:none;
    margin:5px;
    background:#22c55e;
    color:white;
    cursor:pointer;
}

button:hover {
    background:#16a34a;
}

progress {
    width:100%;
    height:20px;
}

.circle {
    width:45px;
    height:45px;
    border-radius:50%;
    background:#1f2937;
    display:inline-block;
    text-align:center;
    line-height:45px;
    margin:5px;
}
</style>
</head>

<body>

<h2>🏥 Hospital Game</h2>

<div class="card">
    👤 {{user.username}} <br><br>

    💰 Монеты: {{user.coins}} <br>
    💎 Алмазы: {{user.diamonds}} <br><br>

    ⭐ Уровень: {{user.level}} <br>

    <progress value="{{user.exp}}" max="{{user.level*100}}"></progress>
    <br>
    XP: {{user.exp}} / {{user.level*100}}
</div>

<div class="card">
    <a href="/patients"><button>📋 Пациенты</button></a>
    <a href="/chat"><button>💬 Чат</button></a>
    <a href="/surgery"><button>🏥 Операционная</button></a>
    <a href="/lab"><button>🧪 Лаборатория</button></a>
    <a href="/exchange"><button>🔄 Обменник</button></a>
    <a href="/reward"><button>🎁 Награда</button></a>
</div>

<div class="card">
    🚗 Автопарк:
    <div class="circle">🚑</div>
    <div class="circle">🚗</div>
    <div class="circle">🚓</div>
</div>

<div class="card">
    👥 Онлайн игроков: <span id="online">...</span>
</div>

<script>
setInterval(() => {
    fetch("/online")
    .then(r => r.json())
    .then(d => {
        document.getElementById("online").innerText = d.online;
    });
}, 2000);
</script>

</body>
</html>
