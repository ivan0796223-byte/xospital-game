<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MEDICAL RP</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#0b0b0b;
    color:white;
}

/* LOGIN */
#loginScreen{
    position:fixed;
    inset:0;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#0b0b0b;
}

.loginBox{
    width:320px;
    background:#1c1c1c;
    padding:20px;
    border-radius:12px;
    border:2px solid red;
}

input{
    width:100%;
    padding:10px;
    margin-top:10px;
    border:none;
    border-radius:6px;
}

button{
    width:100%;
    padding:10px;
    margin-top:10px;
    background:red;
    color:white;
    border:none;
    border-radius:6px;
    cursor:pointer;
}

/* GAME */
#game{
    display:none;
    padding:10px;
}

.panel{
    background:#1c1c1c;
    padding:10px;
    margin:10px 0;
    border-radius:10px;
}

h2{color:red;}

.list{
    background:#111;
    padding:10px;
    border-radius:8px;
    max-height:250px;
    overflow:auto;
}

.item{
    padding:6px;
    border-bottom:1px solid #222;
    cursor:pointer;
}

.item:hover{
    background:#222;
}

.progress{
    width:100%;
    height:8px;
    background:#333;
    border-radius:10px;
    overflow:hidden;
}

.bar{
    height:8px;
    background:red;
    width:0%;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginScreen">

    <div class="loginBox">

        <h2>☩ MEDICAL RP</h2>

        <input id="name" placeholder="Логин">
        <input id="pass" type="password" placeholder="Пароль">

        <button onclick="register()">Регистрация</button>
        <button onclick="login()">Войти</button>

        <div id="status" style="margin-top:10px;color:gray;text-align:center;"></div>

    </div>

</div>

<!-- GAME -->
<div id="game">

<div class="panel">

<h2>👤 Игрок: <span id="player"></span></h2>

💰 Деньги: <span id="money">100</span><b
 Алмазы: <span id="diamonds">10</span><br
XP: <span id="xp">0</span>

</div>

<div class="panel">

<h2>🧑 Пациенты</h2>

<button onclick="loadPatients()">Загрузить</button>

<div class="list" id="patients"></div>

</div>

</div>

<script>

let money=100;
let diamonds=10;
let xp=0;

// статус
function setStatus(t,c){
    let s=document.getElementById("status");
    s.innerText=t;
    s.style.color=c;
}

// 🔥 РЕГИСТРАЦИЯ (СРАЗУ В ИГРУ)
function register(){

    let name=document.getElementById("name").value.trim();
    let pass=document.getElementById("pass").value.trim();

    if(name===""||pass===""){
        setStatus("Введите данные","red");
        return;
    }

    localStorage.setItem("rp_name",name);
    localStorage.setItem("rp_pass",pass);

    openGame(name);
}

// 🔑 ВХОД
function login(){

    let name=document.getElementById("name").value.trim();
    let pass=document.getElementById("pass").value.trim();

    let sName=localStorage.getItem("rp_name");
    let sPass=localStorage.getItem("rp_pass");

    if(name===sName && pass===sPass){
        openGame(name);
    }else{
        setStatus("Неверный логин","red");
    }
}

// 🚀 ОТКРЫТИЕ ИГРЫ
function openGame(name){

    document.getElementById("loginScreen").style.display="none";
    document.getElementById("game").style.display="block";
    document.getElementById("player").innerText=name;
}

// 🧑 ПАЦИЕНТЫ
function loadPatients(){

    let box=document.getElementById("patients");
    box.innerHTML="";

    for(let i=1;i<=50;i++){

        let div=document.createElement("div");
        div.className="item";

        div.innerHTML=`
            🧑 Пациент #${i}
            <div class="progress">
                <div class="bar" id="b${i}"></div>
            </div>
        `;

        div.onclick=()=>heal(i);

        box.appendChild(div);
    }
}
