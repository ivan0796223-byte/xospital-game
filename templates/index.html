<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Hospital Game</title>

<style>
body {
    font-family: Arial;
    text-align: center;
    background: #1e1e2f;
    color: white;
}

.card {
    background: #2b2b40;
    padding: 20px;
    margin: 20px auto;
    width: 250px;
    border-radius: 10px;
}

button {
    padding: 10px 15px;
    margin: 5px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
}

.work { background: green; color: white; }
.refresh { background: orange; color: black; }
</style>
</head>

<body>

<h1>🏥 Hospital Game</h1>

<div class="card">
    💰 Деньги: <span id="money">{{ player.money }}</span><br>
    ⭐ Опыт: <span id="xp">{{ player.xp }}</span>
</div>

<button class="work" onclick="work()">💼 Работать</button>
<button class="refresh" onclick="updateData()">🔄 Обновить</button>

<script>
function updateData() {
    fetch("/get_data")
    .then(res => res.json())
    .then(data => {
        document.getElementById("money").innerText = data.money;
        document.getElementById("xp").innerText = data.xp;
    });
}

function work() {
    fetch("/work")
    .then(() => updateData());
}
</script>

</body>
</html>
