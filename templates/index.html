<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MEDICAL RP ONLINE</title>

<style>

body{
    margin:0;
    background:#0b0b0b;
    color:white;
    font-family:Arial;
}

/* LOGIN */

#loginScreen{
    position:fixed;
    inset:0;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#0b0b0b;
}

.loginBox{
    width:320px;
    background:#1c1c1c;
    padding:20px;
    border-radius:12px;
    border:2px solid red;
}

.loginTitle{
    text-align:center;
    color:red;
    font-size:24px;
    margin-bottom:10px;
}

input{
    width:100%;
    padding:10px;
    margin-top:10px;
    border:none;
    border-radius:6px;
    box-sizing:border-box;
}

button{
    width:100%;
    padding:10px;
    margin-top:10px;
    background:red;
    color:white;
    border:none;
    border-radius:6px;
    cursor:pointer;
}

/* GAME */

#game{
    display:none;
}

header{
    background:#111;
    padding:10px;
    border-bottom:2px solid red;
}

.container{
    padding:10px;
}

.panel{
    background:#1c1c1c;
    padding:10px;
    border-radius:10px;
    margin-bottom:10px;
}

h2{
    color:red;
}

.progress{
    width:100%;
    height:10px;
    background:#333;
    border-radius:10px;
    overflow:hidden;
    margin-top:5px;
}

.bar{
    height:10px;
    background:red;
    width:0%;
}

.list{
    background:#111;
    border-radius:8px;
    max-height:300px;
    overflow:auto;
    padding:5px;
}

.item{
    padding:6px;
    border-bottom:1px solid #222;
    cursor:pointer;
}

.item:hover{
    background:#222;
}

.chat{
    background:black;
    height:150px;
    overflow:auto;
    border-radius:8px;
    padding:5px;
}

.msg{
    padding:4px;
    border-bottom:1px solid #222;
}

</style>
</head>

<body>

<!-- LOGIN -->

<div id="loginScreen">

    <div class="loginBox">

        <div class="loginTitle">
            ☩ MEDICAL RP
        </div>

        <input
            id="name"
            placeholder="Логин"
        >

        <input
            id="pass"
            type="password"
            placeholder="Пароль"
        >

        <button onclick="register()">
            Регистрация
        </button>

        <button onclick="login()">
            Войти
        </button>

        <div
            id="status"
            style="
            margin-top:10px;
            text-align:center;
            color:gray;
            "
        ></div>

    </div>

</div>

<!-- GAME -->

<div id="game">

<header>
☩ MEDICAL RP ONLINE
</header>

<div class="container">

<!-- PROFILE -->

<div class="panel">

<h2>
Добро пожаловать,
<span id="player"></span>
</h2>

💰 Деньги:
<span id="money">100</span><

💎 Алмазы:
<span id="diamonds">10</span><b
⭐ XP:
<span id="xp">0</span><b
🏆 Уровень:
<span id="level">1</span><br
 Онлайн:
<span id="online">147</span>

<div class="progress">
<div class="bar" id="xpBar"></div>
</div>

</div>

<!-- PATIENTS -->

<div class="panel">

<h2>🧑 Пациенты</h2>

<button onclick="loadPatients()">
Загрузить пациентов
</button>

<div
    class="list"
    id="patients"
></div>

</div>

<!-- CHAT -->

<div class="panel">

<h2>💬 Чат</h2>

<div
    class="chat"
    id="chat"
></div>

<input
    id="chatInput"
    placeholder="Сообщение"
>

<button onclick="sendMessage()">
Отправить
</button>

</div>

</div>

</div>

    let s =
        document.getElementById("status");

    s.innerText = text;
    s.style.color = color;
}
