<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MEDICAL RP</title>

<style>
body{
    margin:0;
    background:#111;
    color:white;
    font-family:Arial;
}

header{
    background:#1c1c1c;
    padding:15px;
    text-align:center;
    border-bottom:3px solid red;
    font-size:28px;
}

.panel{
    margin:20px;
    padding:20px;
    background:#1c1c1c;
    border:2px solid red;
    border-radius:15px;
}

input{
    width:100%;
    padding:12px;
    margin-top:10px;
    border:none;
    border-radius:10px;
    background:#222;
    color:white;
    box-sizing:border-box;
}

button{
    width:100%;
    padding:15px;
    margin-top:10px;
    background:red;
    border:none;
    color:white;
    border-radius:10px;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    opacity:0.9;
}

#game{
    display:none;
}

#status{
    padding:10px;
    background:#222;
    border-radius:10px;
}
</style>
</head>

<body>

<header>☩ MEDICAL RP ONLINE</header>

<div id="auth">

<div class="panel">
<h2>Регистрация</h2>
<input id="regLogin" placeholder="Логин">
<input id="regPass" type="password" placeholder="Пароль">
<button onclick="register()">Регистрация</button>
</div>

<div class="panel">
<h2>Вход</h2>
<input id="logLogin" placeholder="Логин">
<input id="logPass" type="password" placeholder="Пароль">
<button onclick="login()">Войти</button>
</div>

</div>

<div id="game">

<div class="panel">

<h2>Пациент</h2>

<div id="status">Ожидание вызова</div>

<button onclick="takeCall()">🚑 Принять вызов</button>
<button onclick="goOperation()">🏥 В операционную</button>
<button onclick="healPatient()">💊 Лечить пациента</button>

</div>

</div>

<script>

let accepted = false;
let operation = false;

function register(){

let l = document.getElementById("regLogin").value;
let p = document.getElementById("regPass").value;

if(l === "" || p === ""){
alert("Заполните поля");
return;
}

localStorage.setItem("login", l);
localStorage.setItem("pass", p);

alert("Регистрация успешна");
}

function login(){

let l = document.getElementById("logLogin").value;
let p = document.getElementById("logPass").value;

let savedL = localStorage.getItem("login");
let savedP = localStorage.getItem("pass");

if(!savedL || !savedP){
alert("Сначала зарегистрируйтесь");
return;
}

if(l === savedL && p === savedP){
document.getElementById("auth").style.display = "none";
document.getElementById("game").style.display = "block";
}else{
alert("Неверный логин или пароль");
}

}

function takeCall(){
accepted = true;
status.innerText = "🚑 Вызов принят";
}

function goOperation(){
if(!accepted){
alert("Сначала примите вызов");
return;
}
operation = true;
status.innerText = "🏥 Пациент в операционной";
}

function healPatient(){
if(!accepted || !operation){
alert("Неправильный порядок действий");
return;
}
status.innerText = "💊 Пациент вылечен";
accepted = false;
operation = false;
}

</script>

</body>
</html>
