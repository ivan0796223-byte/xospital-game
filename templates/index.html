<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MEDICAL RP</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#0b0b0b;
    color:white;
}

.container{
    padding:10px;
}

.panel{
    background:#1c1c1c;
    padding:10px;
    margin:10px 0;
    border-radius:10px;
    border:1px solid #222;
}

h2{color:red;}

button{
    background:red;
    color:white;
    border:none;
    padding:10px;
    margin-top:5px;
    border-radius:6px;
}

input,select{
    padding:10px;
    width:95%;
    margin-top:5px;
    border-radius:6px;
    border:none;
}

.chat{
    height:150px;
    overflow:auto;
    background:black;
    padding:5px;
    border-radius:6px;
}

.msg{
    background:#333;
    padding:5px;
    margin:5px 0;
    border-radius:5px;
}
</style>
</head>

<body>

<div class="container">

<!-- КУБИК -->
<div class="panel">
<h2>🎲 Операционная</h2>
<div id="dice">Результат: -</div>
<button onclick="rollDice()">Кинуть кубик</button>
</div>

<!-- СОЮЗ -->
<div class="panel">
<h2>🤝 Союзы</h2>
<button onclick="createAlliance()">Создать союз (−500💎)</button>
</div>

<!-- ПАЦИЕНТЫ -->
<div class="panel">
<h2>🧑‍🤝‍🧑 Пациенты</h2>

<select id="patients"></select>
<button onclick="loadPatients()">Загрузить пациентов</button>
<button onclick="callPatient()">Вызвать пациента</button>
</div>

<!-- СКОРАЯ -->
<div class="panel">
<h2>🚑 Автопарк</h2>
<button onclick="ambulance()">Вызвать скорую</button>
</div>

<!-- ЧАТ -->
<div class="panel">
<h2>💬 Чат</h2>

<div class="chat" id="chat"></div>
<input id="msg" placeholder="Сообщение">
<button onclick="send()">Отправить</button>
</div>

</div>

<script>

// 🎲 кубик
function rollDice(){
    let r = Math.floor(Math.random()*6)+1;
    document.getElementById("dice").innerText = "Результат: " + r;
}

// 🤝 союз
function createAlliance(){
    alert("Союз создан!");
}

// 🧑‍🤝‍🧑 пациенты
function loadPatients(){
    let sel = document.getElementById("patients");
    sel.innerHTML = "";

    for(let i=1;i<=20;i++){
        let opt = document.createElement("option");
        opt.text = "Пациент #" + i;
        sel.add(opt);
    }

    alert("Пациенты загружены");
}

function callPatient(){
    let sel = document.getElementById("patients");
    alert("Вызван: " + sel.value);
}

// 🚑 скорая
function ambulance(){
    alert("Скорая выехала!");
}

// 💬 чат
function send(){
    let input = document.getElementById("msg");
    let chat = document.getElementById("chat");

    if(input.value.trim()=="") return;

    let div = document.createElement("div");
    div.className="msg";
    div.innerText="Игрок: " + input.value;

    chat.appendChild(div);

    input.value="";
    chat.scrollTop=chat.scrollHeight;
}

</script>

</body>
</html>
