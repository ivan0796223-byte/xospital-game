<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MEDICAL RP</title>

<style>
body{
    margin:0;
    background:#111;
    color:white;
    font-family:Arial;
}

header{
    background:#1c1c1c;
    padding:15px;
    text-align:center;
    border-bottom:3px solid red;
    font-size:22px;
}

.panel{
    margin:15px;
    padding:15px;
    background:#1c1c1c;
    border:2px solid red;
    border-radius:15px;
}

button{
    width:100%;
    padding:12px;
    margin-top:8px;
    background:red;
    border:none;
    color:white;
    border-radius:10px;
}

input{
    width:100%;
    padding:10px;
    margin-top:8px;
    border:none;
    border-radius:10px;
    background:#222;
    color:white;
    box-sizing:border-box;
}

.chat{
    height:120px;
    overflow:auto;
    background:#111;
    padding:10px;
    border-radius:10px;
    margin-top:10px;
}

.grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px;
}

.small{
    font-size:14px;
    opacity:0.8;
}
</style>
</head>

<body>

<header>
☩ MEDICAL RP | <span id="time"></span> МСК
</header>

<div class="panel">

<h3>Вход</h3>

<input id="login" placeholder="Логин">
<input id="pass" type="password" placeholder="Пароль">

<button onclick="register()">Регистрация</button>
<button onclick="login()">Войти</button>

</div>

<div id="game" style="display:none;">

<div class="panel grid">

<div>
<h3>🏥 Палаты (2000)</h3>
<div class="small" id="rooms"></div>
</div>

<div>
<h3>🚑 Автопарк (2000)</h3>
<div class="small" id="cars"></div>
</div>

</div>

<div class="panel">

<h3>👨‍⚕️ Пациенты (2000)</h3>
<div class="small" id="patients"></div>

</div>

<div class="panel">

<h3>🏥 Операционная (Кубик)</h3>

<button onclick="rollDice()">🎲 Бросить кубик</button>

<div id="oplog" class="small"></div>

</div>

<div class="panel">

<h3>💬 Чат пациентов</h3>
<div class="chat" id="chat1"></div>
<input id="msg1" placeholder="Сообщение">
<button onclick="send1()">Отправить</button>
</div>

<div class="panel">

<h3>🏨 Чат палат</h3>
<div class="chat" id="chat2"></div>
<input id="msg2" placeholder="Сообщение">
<button onclick="send2()">Отправить</button>
</div>

</div>

<script>

let players = [];

function register(){
localStorage.setItem("l", login.value);
localStorage.setItem("p", pass.value);
alert("OK");
}

function login(){
if(login.value===localStorage.getItem("l") && pass.value===localStorage.getItem("p")){
document.getElementById("game").style.display="block";
}else{
alert("Ошибка");
}
}

// генерация 2000 данных (оптимально)
function init(){

let r = "";
let c = "";
let p = "";

for(let i=1;i<=2000;i++){
r += "Палата #" + i + "
";
c +
ашина #" + i + "
";

if
50){
p += "Пациент #" + i + " (ожидает)
";
}
}
oms.innerHTML = r;
cars.innerHTML = c;
patients.innerHTML = p;
}

function rollDice(){

let d1 = Math.floor(Math.random()*6)+1;
let d2 = Math.floor(Math.random()*6)+1;

let winner = d1>d2 ? "Врач 1" : "Врач 2";

oplog.innerHTML =
"🎲 Врач1: " + d1 + "
🎲 Врач2
+ d2 +
"
<b>Побед
" + winner + "</b>";
}

function send1(){
if(msg1.value=="")return;
chat1.innerHTML += "<p>👤 " + msg1.value + "</p>";
msg1.value="";
chat1.scrollTop=999999;
}

function send2(){
if(msg2.value=="")return;
chat2.innerHTML += "<p>🏨 " + msg2.value + "</p>";
msg2.value="";
chat2.scrollTop=999999;
}

// время МСК
function time(){
let d=new Date();
let msk=new Date(d.getTime()+3*60*60*1000);
time.innerText = msk.toTimeString().split(" ")[0];
}

setInterval(time,1000);
time();

init();

</script>

</body>
</html>
