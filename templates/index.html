<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MEDICAL RP</title>

<style>

body{
    margin:0;
    background:#111;
    color:white;
    font-family:Arial;
}

header{
    background:#1b1b1b;
    padding:15px;
    text-align:center;
    font-size:28px;
    border-bottom:3px solid red;
}

#auth{
    width:320px;
    margin:60px auto;
    background:#1c1c1c;
    padding:20px;
    border-radius:15px;
    border:2px solid red;
    box-shadow:0 0 20px rgba(255,0,0,0.3);
}

#auth h2{
    text-align:center;
    color:red;
}

input{
    width:100%;
    padding:12px;
    margin-top:10px;
    border:none;
    border-radius:10px;
    background:#2b2b2b;
    color:white;
    box-sizing:border-box;
}

button{
    width:100%;
    padding:12px;
    margin-top:12px;
    border:none;
    border-radius:10px;
    background:red;
    color:white;
    font-size:16px;
    cursor:pointer;
    transition:0.2s;
}

button:hover{
    transform:scale(1.03);
}

#game{
    display:none;
    padding:20px;
}

.panel{
    background:#1c1c1c;
    padding:15px;
    margin-top:15px;
    border-radius:15px;
    border:2px solid red;
}

.stats{
    display:flex;
    gap:10px;
    flex-wrap:wrap;
}

.card{
    flex:1;
    min-width:120px;
    background:#222;
    padding:15px;
    border-radius:12px;
    text-align:center;
    border:1px solid red;
}

.chat{
    height:200px;
    overflow:auto;
    background:#111;
    padding:10px;
    border-radius:10px;
    margin-bottom:10px;
}

</style>
</head>
<body>

<header>
☩ MEDICAL RP ONLINE
</header>

<div id="auth">

<h2>Регистрация / Вход</h2>

<input type="text" id="login" placeholder="Логин">

<input type="password" id="password" placeholder="Пароль">

<button onclick="register()">Регистрация</button>

<button onclick="login()">Войти</button>

</div>

<div id="game">

<h1>Добро пожаловать в MEDICAL RP</h1>

<div class="panel">

<div class="stats">

<div class="card">
❤️
<h3>HP</h3>
<p>100</p>
</div>

<div class="card">
💎
<h3>Алмазы</h3>
<p>25</p>
</div>

<div class="card">
💰
<h3>Монеты</h3>
<p>500</p>
</div>

<div class="card">
👨‍⚕️
<h3>Онлайн</h3>
<p>148</p>
</div>

</div>

</div>

<div class="panel">

<h2>Вызовы пациентов</h2>

<button>🚑 Принять вызов</button>
<button>🏥 В операционную</button>
<button>💊 Лечить пациента</button>

</div>

<div class="panel">

<h2>Чат</h2>

<div class="chat" id="chat-box"></div>

<input type="text" id="chat-input" placeholder="Сообщение">

<button onclick="sendMessage()">Отправить</button>

</div>

</div>

<script>

function register(){

let login = document.getElementById("login").value;
let password = document.getElementById("password").value;

if(login === "" || password === ""){
    alert("Заполните поля");
    return;
}

localStorage.setItem("login", login);
localStorage.setItem("password", password);

alert("Регистрация успешна");

document.getElementById("auth").style.display = "none";
document.getElementById("game").style.display = "block";

}

function login(){

let login = document.getElementById("login").value;
let password = document.getElementById("password").value;

let savedLogin = localStorage.getItem("login");
let savedPassword = localStorage.getItem("password");

if(login === savedLogin && password === savedPassword){

    alert("Вход выполнен");

    document.getElementById("auth").style.display = "none";
    document.getElementById("game").style.display = "block";

}else{
    alert("Неверный логин или пароль");
}

}

function sendMessage(){

let input = document.getElementById("chat-input");
let chat = document.getElementById("chat-box");

if(input.value.trim() !== ""){

chat.innerHTML += "<p>👤 " + input.value + "</p>";

input.value = "";

chat.scrollTop = chat.scrollHeight;

}

}

</script>

</body>
</html>
