<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MEDICAL RP</title>

<style>
body{
    margin:0;
    background:#111;
    color:white;
    font-family:Arial;
}

header{
    background:#1c1c1c;
    padding:15px;
    text-align:center;
    border-bottom:3px solid red;
    font-size:28px;
}

.panel{
    margin:20px;
    padding:20px;
    background:#1c1c1c;
    border:2px solid red;
    border-radius:15px;
}

input{
    width:100%;
    padding:12px;
    margin-top:10px;
    border:none;
    border-radius:10px;
    background:#222;
    color:white;
    box-sizing:border-box;
}

button{
    width:100%;
    padding:15px;
    margin-top:10px;
    background:red;
    border:none;
    color:white;
    border-radius:10px;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    opacity:0.9;
}

#game{ display:none; }

#status{
    padding:10px;
    background:#222;
    border-radius:10px;
    margin-bottom:10px;
}

.stats{
    display:flex;
    gap:10px;
    flex-wrap:wrap;
}

.card{
    flex:1;
    min-width:120px;
    background:#222;
    border:1px solid red;
    border-radius:12px;
    padding:15px;
    text-align:center;
}

.chat{
    height:150px;
    overflow:auto;
    background:#111;
    padding:10px;
    border-radius:10px;
    margin-bottom:10px;
}

</style>
</head>

<body>

<header>
☩ MEDICAL RP ONLINE | <span id="time">00:00:00</span> МСК
</header>

<div id="auth">

<div class="panel">
<h2>Регистрация</h2>
<input id="regLogin" placeholder="Логин">
<input id="regPass" type="password" placeholder="Пароль">
<button onclick="register()">Регистрация</button>
</div>

<div class="panel">
<h2>Вход</h2>
<input id="logLogin" placeholder="Логин">
<input id="logPass" type="password" placeholder="Пароль">
<button onclick="login()">Войти</button>
</div>

</div>

<div id="game">

<div class="panel">

<h2>Статистика</h2>

<div class="stats">

<div class="card">
🏥 Палаты
<p>2000</p>
</div>

<div class="card">
🚑 Автопарк
<p>2000</p>
</div>

<div class="card">
👨‍⚕️ Онлайн
<p>148</p>
</div>

</div>

</div>

<div class="panel">

<h2>Пациент</h2>

<div id="status">Ожидание вызова</div>

<button onclick="takeCall()">🚑 Принять вызов</button>
<button onclick="goOperation()">🏥 В операционную</button>
<button onclick="healPatient()">💊 Лечить пациента</button>

</div>

<div class="panel">

<h2>Чат палаты пациентов</h2>

<div class="chat" id="chat"></div>

<input id="msg" placeholder="Сообщение">
<button onclick="sendMsg()">Отправить</button>

</div>

</div>

<script>

let accepted = false;
let operation = false;

function register(){
let l = regLogin.value;
let p = regPass.value;

if(!l || !p){
alert("Заполните поля");
return;
}

localStorage.setItem("login", l);
localStorage.setItem("pass", p);

alert("ОК");
}

function login(){
let l = logLogin.value;
let p = logPass.value;

if(l === localStorage.getItem("login") &&
p === localStorage.getItem("pass")){
auth.style.display="none";
game.style.display="block";
}else{
alert("Ошибка");
}
}

function takeCall(){
accepted = true;
status.innerText = "🚑 Вызов принят";
}

function goOperation(){
if(!accepted){ alert("Сначала вызов"); return; }
operation = true;
status.innerText = "🏥 В операционной";
}

function healPatient(){
if(!accepted || !operation){
alert("Ошибка");
return;
}
status.innerText = "💊 Пациент вылечен";
accepted = false;
operation = false;
}

function sendMsg(){
let m = msg.value;
if(!m) return;

chat.innerHTML += "<p>👤 " + m + "</p>";
msg.value = "";
chat.scrollTop = chat.scrollHeight;
}

function updateTime(){
let now = new Date();
let msk = new Date(now.getTime() + (3*60*60*1000));
time.innerText = msk.toTimeString().split(" ")[0];
}

setInterval(updateTime,1000);
updateTime();

</script>

</body>
</html>
