<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Xospital</title>

<style>
body {
    margin:0;
    font-family:Arial;
    background:#0b1220;
    color:white;
}

.header {
    background:#111827;
    padding:15px;
}

.container {
    display:flex;
    gap:15px;
    padding:15px;
}

.card {
    flex:1;
    background:#1e293b;
    padding:15px;
    border-radius:12px;
}

.bar {
    width:100%;
    background:#334155;
    border-radius:10px;
    height:15px;
    overflow:hidden;
}

.fill {
    height:100%;
    background:#22c55e;
}

button {
    width:100%;
    margin-top:10px;
    padding:10px;
    border:none;
    border-radius:8px;
    background:#3b82f6;
    color:white;
}
</style>
</head>

<body>

<div class="header">
    👤 Игрок: {{ user }}
    | 💰 50000
    | 💎 Алмазы: {{ user.diamonds }}
    | 🧬 Уровень: {{ user.level }}
</div>

<div class="container">

    <!-- ОРВИ -->
    <div class="card">
        <h3>🦠 ОРВИ пациента</h3>
        <div class="bar">
            <div class="fill" style="width: {{ user.orvi }}%"></div>
        </div>
        <p>{{ user.orvi }}%</p>
    </div>

    <!-- ПРОГРЕСС -->
    <div class="card">
        <h3>📈 Прогресс</h3>
        <div class="bar">
            <div class="fill" style="width: {{ user.xp }}%"></div>
        </div>
        <p>{{ user.xp }}/100 XP</p>

        <button onclick="act()">💉 Лечить</button>
    </div>

    <!-- АЛМАЗЫ -->
    <div class="card">
        <h3>💎 Магазин</h3>
        <button onclick="act()">+ Алмаз</button>
    </div>

</div>

<script>
function act() {
    fetch("/action", {
        method:"POST"
    })
    .then(r => r.json())
    .then(() => location.reload());
}
</script>

</body>
</html>
