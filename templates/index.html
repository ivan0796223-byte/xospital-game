<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MEDICAL RP</title>

<style>
body{
margin:0;
background:#111;
color:white;
font-family:Arial;
}

.panel{
margin:15px;
padding:15px;
background:#1c1c1c;
border:2px solid red;
border-radius:12px;
}

input{
width:100%;
padding:12px;
margin-top:8px;
border:none;
border-radius:10px;
background:#222;
color:white;
box-sizing:border-box;
}

button{
width:100%;
padding:12px;
margin-top:8px;
background:red;
border:none;
color:white;
border-radius:10px;
cursor:pointer;
}

#game{
display:none;
}

</style>
</head>

<body>

<div id="auth">

<div class="panel">
<h3>Регистрация</h3>
<input id="regLogin" placeholder="Логин">
<input id="regPass" type="password" placeholder="Пароль">
<button onclick="register()">Регистрация</button>
</div>

<div class="panel">
<h3>Вход</h3>
<input id="logLogin" placeholder="Логин">
<input id="logPass" type="password" placeholder="Пароль">
<button onclick="login()">Войти</button>
</div>

</div>

<div id="game" class="panel">
<h2>ИГРА ЗАПУЩЕНА ✔</h2>
<p>Регистрация работает</p>
</div>

<script>

function register(){

let login = document.getElementById("regLogin").value;
let pass = document.getElementById("regPass").value;

if(login === "" || pass === ""){
alert("Заполните поля");
return;
}

localStorage.setItem("user_login", login);
localStorage.setItem("user_pass", pass);

alert("Регистрация успешна ✔");
}

function login(){

let login = document.getElementById("logLogin").value;
let pass = document.getElementById("logPass").value;

let savedLogin = localStorage.getItem("user_login");
let savedPass = localStorage.getItem("user_pass");

if(!savedLogin || !savedPass){
alert("Сначала зарегистрируйтесь");
return;
}

if(login === savedLogin && pass === savedPass){

document.getElementById("auth").style.display = "none";
document.getElementById("game").style.display = "block";

}else{
alert("Неверный логин или пароль");
}

}

</script>

</body>
</html>
