<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MEDICAL RP</title>

<style>
body{
margin:0;
background:#111;
color:white;
font-family:Arial;
}

header{
background:#1c1c1c;
padding:15px;
text-align:center;
border-bottom:3px solid red;
font-size:22px;
}

.panel{
margin:15px;
padding:15px;
background:#1c1c1c;
border:2px solid red;
border-radius:12px;
}

input{
width:100%;
padding:12px;
margin-top:8px;
border:none;
border-radius:10px;
background:#222;
color:white;
box-sizing:border-box;
}

button{
width:100%;
padding:12px;
margin-top:8px;
background:red;
border:none;
color:white;
border-radius:10px;
font-size:16px;
cursor:pointer;
}

button:hover{
opacity:0.9;
}

#game{
display:none;
}

.small{
font-size:13px;
opacity:0.8;
}
</style>
</head>

<body>

<header>☩ MEDICAL RP ONLINE</header>

<!-- РЕГИСТРАЦИЯ -->
<div id="auth">

<div class="panel">
<h3>Регистрация</h3>
<input id="regL" placeholder="Логин">
<input id="regP" type="password" placeholder="Пароль">
<button onclick="register()">Создать аккаунт</button>
</div>

<div class="panel">
<h3>Вход</h3>
<input id="logL" placeholder="Логин">
<input id="logP" type="password" placeholder="Пароль">
<button onclick="login()">Войти</button>
</div>

</div>

<!-- ИГРА -->
<div id="game">

<div class="panel">
<h3>🏥 MEDICAL RP</h3>
<p class="small">Регистрация работает ✔</p>
<p class="small">Вход работает ✔</p>
</div>

<div class="panel">
<h3>👨‍⚕️ Пациенты</h3>
<div class="small" id="patients"></div>
</div>

</div>

<script>

function register(){

let l = document.getElementById("regL").value;
let p = document.getElementById("regP").value;

if(!l || !p){
alert("Заполните поля");
return;
}

localStorage.setItem("login", l);
localStorage.setItem("pass", p);

alert("Регистрация успешна ✔");
}

function login(){

let l = document.getElementById("logL").value;
let p = document.getElementById("logP").value;

let savedL = localStorage.getItem("login");
let savedP = localStorage.getItem("pass");

if(!savedL || !savedP){
alert("Сначала зарегистрируйтесь");
return;
}

if(l === savedL && p === savedP){

document.getElementById("auth").style.display = "none";
document.getElementById("game").style.display = "block";

initPatients();

}else{
alert("Неверный логин или пароль");
}

}

// 2000 пациентов (без лагов)
function initPatients(){
let html = "";
for(let i=1;i<=2000;i++){
html += "Пациент #" + i + " — ожидает лечения
"
document.getElementById("patients").innerHTML = html;
}

</script>

</body>
</html>
