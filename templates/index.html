<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MEDICAL RP</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#0b0b0b;
    color:white;
}

.container{padding:10px;}

.panel{
    background:#1c1c1c;
    padding:10px;
    margin:10px 0;
    border-radius:10px;
}

h2{color:red;}

button{
    background:red;
    color:white;
    border:none;
    padding:10px;
    margin-top:5px;
    border-radius:6px;
    cursor:pointer;
}

select{
    width:100%;
    padding:10px;
    margin-top:5px;
}

.list{
    background:#111;
    padding:10px;
    border-radius:8px;
    max-height:200px;
    overflow:auto;
}

.item{
    padding:5px;
    border-bottom:1px solid #222;
    cursor:pointer;
}

.item:hover{
    background:#222;
}
</style>
</head>

<body>

<div class="container">

<!-- 🧑 ПАЦИЕНТЫ -->
<div class="panel">
<h2>🧑‍🤝‍🧑 Пациенты (2000)</h2>

<button onclick="loadPatients()">Загрузить пациентов</button>

<div class="list" id="patientList"></div>
</div>

<!-- 🏥 ОПЕРАЦИОННАЯ -->
<div class="panel">
<h2>🏥 Операционная очередь</h2>

<div class="list" id="surgery"></div>
</div>

<!-- 🚑 МАШИНЫ -->
<div class="panel">
<h2>🚑 Автопарк</h2>
<button onclick="loadCars()">Показать машины</button>
<div class="list" id="cars"></div>
</div>

</div>

<script>

// 🧑 2000 пациентов
function loadPatients(){
    let list=document.getElementById("patientList");
    list.innerHTML="";

    for(let i=1;i<=2000;i++){
        let div=document.createElement("div");
        div.className="item";
        div.innerText="Пациент #" + i;

        div.onclick=function(){
            sendToSurgery(i);
        };

        list.appendChild(div);
    }
}

// 🏥 отправка в операционную
function sendToSurgery(id){
    let surgery=document.getElementById("surgery");

    let div=document.createElement("div");
    div.className="item";
    div.innerText="🏥 Пациент #" + id + " → операция";

    surgery.appendChild(div);
}

// 🚑 машины
function loadCars(){
    let cars=document.getElementById("cars");
    cars.innerHTML="";

    let list=["🚑 Ambulance A","🚑 Ambulance B","🚑 Ambulance C","🚑 Ambulance D"];

    list.forEach(c=>{
        let div=document.createElement("div");
        div.className="item";
        div.innerText=c;
        cars.appendChild(div);
    });
}

</script>

</body>
</html>
