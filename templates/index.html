<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MEDICAL RP HOSPITAL</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#0b0b0b;
    color:white;
}

.container{padding:10px;}

.panel{
    background:#1c1c1c;
    padding:10px;
    margin:10px 0;
    border-radius:10px;
}

h2{color:red;}

button{
    background:red;
    color:white;
    border:none;
    padding:10px;
    margin-top:5px;
    border-radius:6px;
    cursor:pointer;
}

.list{
    background:#111;
    padding:10px;
    border-radius:8px;
    max-height:200px;
    overflow:auto;
}

.item{
    padding:6px;
    border-bottom:1px solid #222;
    cursor:pointer;
}

.item:hover{
    background:#222;
}

.room{
    background:#111;
    padding:8px;
    margin:5px 0;
    border-radius:8px;
}

.status{
    font-size:12px;
    color:gray;
}
</style>
</head>

<body>

<div class="container">

<!-- 🧑 ПАЦИЕНТЫ -->
<div class="panel">
<h2>🧑 Пациенты</h2>
<button onclick="loadPatients()">Загрузить пациентов</button>
<div class="list" id="patients"></div>
</div>

<!-- 🏥 ПАЛАТЫ -->
<div class="panel">
<h2>🏥 Палаты (5 мест)</h2>
<div id="rooms"></div>
</div>

</div>

<script>

let rooms = [null,null,null,null,null]; // 5 палат

// 🧑 загрузка пациентов
function loadPatients(){
    let p=document.getElementById("patients");
    p.innerHTML="";

    for(let i=1;i<=50;i++){
        let div=document.createElement("div");
        div.className="item";
        div.innerText="Пациент #" + i;

        div.onclick=()=>assignPatient(i);

        p.appendChild(div);
    }
}

// 🏥 создание палат
function renderRooms(){
    let r=document.getElementById("rooms");
    r.innerHTML="";

    for(let i=0;i<rooms.length;i++){

        let div=document.createElement("div");
        div.className="room";

        if(rooms[i]==null){
            div.innerHTML="🏥 Палата #" + (i+1) + " — пусто";
        }else{
            div.innerHTML=`
                🏥 Палата #${i+1}

   
         🧑 Пациент #${rooms[i].id}

    
        <div class="status" id="st${i}">
                    Лечение: ${rooms[i].progress}%
                </div>
            `;
        }

        r.appendChild(div);
    }
}

// 🧑 назначение пациента в палату
function assignPatient(id){

    for(let i=0;i<rooms.length;i++){
        if(rooms[i]==null){

            rooms[i]={
                id:id,
                progress:0
            };

            renderRooms();
            startTreatment(i);
            return;
        }
    }

    alert("Нет свободных палат!");
}

// 🏥 лечение
function startTreatment(index){

    let timer=setInterval(()=>{

        if(!rooms[index]) {
            clearInterval(timer);
            return;
        }

        rooms[index].progress += 10;

        if(rooms[index].progress >= 100){
            rooms[index]=null;
            clearInterval(timer);
        }

        renderRooms();

    }, 1000);
}

// старт
renderRooms();

</script>

</body>
</html>
