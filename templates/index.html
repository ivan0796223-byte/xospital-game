<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Xospital</title>

<style>
body {
    margin:0;
    font-family:Arial;
    background:#0b1220;
    color:white;
}

.header {
    padding:15px;
    background:#111827;
}

.container {
    display:flex;
    gap:15px;
    padding:15px;
}

.card {
    flex:1;
    background:#1e293b;
    padding:15px;
    border-radius:12px;
    max-height:400px;
    overflow:auto;
}

button {
    width:100%;
    margin-top:5px;
    padding:8px;
    border:none;
    border-radius:8px;
    background:#3b82f6;
    color:white;
    cursor:pointer;
}

.selected {
    background:#22c55e;
}
</style>
</head>

<body>

<div class="header">
    👤 {{ name }} |
    💎 {{ user.diamonds }} |
    🧬 Lv {{ user.level }}
</div>

<div class="container">

    <!-- СПИСОК ПАЦИЕНТОВ -->
    <div class="card">
        <h3>🚑 Пациенты</h3>

        {% for p in user.patients %}
            <button onclick="selectPatient({{ p.id }})">
                {{ p.name }} ({{ p.orvi }}%)
            </button>
        {% endfor %}
    </div>

    <!-- ВЫБРАННЫЙ -->
    <div class="card">
        <h3>🧑‍⚕️ Выбранный пациент</h3>

        {% if user.selected_patient %}
            <p>{{ user.selected_patient.name }}</p>
            <p>ОРВИ: {{ user.selected_patient.orvi }}%</p>

            <button onclick="treat()">💉 Лечить</button>
        {% else %}
            <p>Не выбран</p>
        {% endif %}
    </div>

</div>

<script>
function selectPatient(id) {
    fetch("/select_patient", {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({id})
    }).then(() => location.reload());
}

function treat() {
    fetch("/treat", {method:"POST"})
    .then(() => location.reload());
}
</script>

</body>
</html>
